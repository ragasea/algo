# Prompt: GitHub Actions Workflow with Auto-Pages Deployment
# Date: Thursday, April 2, 2026 | Time: 10:45 AM IST

name: Master Quant Hub Bot & Deploy

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '30 3 * * 1-5' # 9:00 AM IST
  workflow_dispatch:

# Required Permissions for Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Trading Strategy
        run: python python_scripts/strategy_v1.py
        # This script could update index.html with new profit data!

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Deploys the root folder (where index.html is)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
